version: "3.9"

# ── 本地开发环境 ──────────────────────────────────
# 用法：docker compose -f docker-compose.dev.yml up
#
# 架构：
#   Vite dev server (5173) — HMR 热重载
#   ts-node-dev (3001)     — 服务端热重载
#   代码目录挂载，修改即生效

services:
  dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"  # Vite
      - "3001:3001"  # Server
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"

volumes:
  node_modules:
